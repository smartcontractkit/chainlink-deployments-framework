version: "1.0.0"
chain_family: evm

input:
  abi_base_path: "./abi"
  bytecode_base_path: "./bytecode"

output:
  base_path: "."

contracts:
  - contract_name: LinkToken
    version: "1.0.0"
    abi_file: "link_token.json"
    functions:
      - name: transfer
        access: public
      - name: balanceOf
        access: public
      - name: approve
        access: public
