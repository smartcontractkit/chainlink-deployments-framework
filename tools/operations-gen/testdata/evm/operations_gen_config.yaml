version: "1.0"

output:
  base_path: "."

contracts:
  - contract_name: ManyChainMultiSig
    version: "1.0.0"
    gobindings_package: "github.com/smartcontractkit/chainlink-deployments-framework/tools/operations-gen/testdata/evm/gobindings/v1_0_0/many_chain_multi_sig"
    functions:
      - name: owner
        access: public
      - name: setConfig
        access: owner
  - contract_name: RBACTimelock
    version: "1.0.0"
    gobindings_package: "github.com/smartcontractkit/chainlink-deployments-framework/tools/operations-gen/testdata/evm/gobindings/v1_0_0/rbac_timelock"
    functions:
      - name: executeBatch
        access: role
        role: EXECUTOR_ROLE
  - contract_name: LinkToken
    version: "1.0.0"
    gobindings_package: "github.com/smartcontractkit/chainlink-deployments-framework/tools/operations-gen/testdata/evm/gobindings/v1_0_0/link_token"
    functions:
      - name: transfer
        access: public
      - name: balanceOf
        access: public
      - name: approve
        access: public
