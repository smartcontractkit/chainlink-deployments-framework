version: '3'

tasks:
  default:
    desc: Runs the linter
    cmds:
      - golangci-lint run {{.CLI_ARGS}}
      - cd {{.ROOT_DIR}}/tools/operations-gen && golangci-lint run {{.CLI_ARGS}}

  verbose:
    desc: Runs the linter in verbose mode
    cmds:
      - golangci-lint run --verbose
      - cd {{.ROOT_DIR}}/tools/operations-gen && golangci-lint run --verbose

  fix:
    desc: Runs the linter in fix mode
    cmds:
      - golangci-lint run --fix
      - cd {{.ROOT_DIR}}/tools/operations-gen && golangci-lint run --fix
